name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Android Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            autoconf automake libtool libtool-bin m4 \
            build-essential pkg-config zlib1g-dev libncurses5-dev libgdbm-dev \
            libssl-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev \
            libsdl2-dev libc6-dev python3-venv

      - name: Verify autotools
        run: |
          echo "=== libtoolize ==="
          libtoolize --version || true
          which libtoolize || true
          echo "=== autoreconf ==="
          autoreconf --version || true
          echo "=== autoconf ==="
          autoconf --version || true
          echo "=== automake ==="
          automake --version || true

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
          pip install cython==0.29.36 virtualenv buildozer

      - name: Cache Buildozer Android platform
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform
            ./.buildozer/android/platform
          key: ${{ runner.os }}-android-platform-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-android-platform-

      - name: Debug versions
        run: |
          echo "=== buildozer ==="
          buildozer --version || true
          echo "=== python-for-android ==="
          python -m pip show python-for-android || true
          pip list | grep -E "buildozer|python-for-android|cython" || true

      - name: Build APK (verbose)
        env:
          P4A_LOG_LEVEL: "2"
        run: |
          set -o pipefail
          yes | buildozer -v android debug 2>&1 | tee buildozer.log

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: buildozer.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
