name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Android Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            autoconf automake libtool libtool-bin m4 \
            build-essential pkg-config zlib1g-dev libncurses5-dev libgdbm-dev \
            libssl-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev \
            libsdl2-dev libc6-dev python3-venv \
            liblzma-dev libreadline-dev xz-utils \
            libltdl-dev

      - name: Fix libtool macros
        run: |
          sudo apt install -y libtool libtool-bin libltdl-dev
          sudo mkdir -p /usr/local/share/aclocal
          sudo libtoolize --force --copy
          sudo aclocal --system-acdir=/usr/share/aclocal || true
          ls /usr/share/aclocal/ | grep -i libtool || true

      - name: Verify autotools
        run: |
          echo "=== libtoolize ==="
          libtoolize --version || true
          which libtoolize || true
          echo "=== autoreconf ==="
          autoreconf --version || true
          echo "=== autoconf ==="
          autoconf --version || true
          echo "=== automake ==="
          automake --version || true

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
          pip install cython==0.29.36 virtualenv buildozer

      - name: Cache Buildozer Android platform
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform
            ./.buildozer/android/platform
          key: ${{ runner.os }}-android-platform-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-android-platform-

      - name: Debug versions
        run: |
          echo "=== buildozer ==="
          buildozer --version || true
          echo "=== python-for-android ==="
          python -m pip show python-for-android || true
          pip list | grep -E "buildozer|python-for-android|cython" || true

      - name: Prepare autotools in all unpacked recipes (attempt)
        run: |
          BASE=".buildozer/android/platform"
          if [ -d "$BASE" ]; then
            echo "Buscando configure.ac en $BASE..."
            find "$BASE" -type f -name configure.ac -print0 | while IFS= read -r -d '' f; do
              d="$(dirname "$f")"
              echo "Preparando autotools en: $d"
              (cd "$d" && libtoolize --force --copy 2>/dev/null || true)
              (cd "$d" && aclocal 2>/dev/null || true)
              (cd "$d" && autoupdate 2>/dev/null || true)
              (cd "$d" && autoreconf -fi 2>/dev/null || true)
            done
          else
            echo "$BASE no encontrado, se omitirá paso de preparación."
          fi

      - name: Build APK (reintentos + verbose)
        env:
          P4A_LOG_LEVEL: "2"
        run: |
          set -euo pipefail
          attempts=0
          max_attempts=3
          while [ $attempts -lt $max_attempts ]; do
            attempts=$((attempts+1))
            echo "Intento $attempts/$max_attempts: ejecutando buildozer..."
            if yes | buildozer -v android debug 2>&1 | tee buildozer.log; then
              echo "Buildozer finalizó correctamente en el intento $attempts"
              break
            else
              echo "Buildozer falló en el intento $attempts"
              if [ $attempts -lt $max_attempts ]; then
                backoff=$((attempts * 20))
                echo "Esperando $backoff segundos antes del reintento..."
                sleep $backoff
              fi
            fi
          done
          if [ $attempts -ge $max_attempts ] && ! grep -q "Buildozer finalizó correctamente" buildozer.log 2>/dev/null; then
            echo "ERROR: buildozer falló después de $max_attempts intentos"
            tail -n 300 buildozer.log || true
            exit 1
          fi

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: buildozer.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
